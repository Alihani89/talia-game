<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Talia">
<meta name="theme-color" content="#ffc2e0">
<title>Talia and her Friends</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body {
    min-height:100%; width:100%;
    background:linear-gradient(180deg,#ffe3f3,#ffc2e0 60%,#e7b6ff);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-user-select:none; user-select:none; -webkit-touch-callout:none;
    color:#39406a;
  }
  body { display:flex; align-items:center; justify-content:center; padding:24px 14px; }
  .card {
    width:min(92vw, 420px);
    background:linear-gradient(180deg,#ffffff,#f6f3ff);
    border-radius:28px; padding:24px 20px 22px;
    box-shadow:0 18px 50px rgba(120,60,140,.3);
    text-align:center;
  }
  .title {
    font-size:38px; font-weight:900; line-height:1.05; letter-spacing:.2px;
    background:linear-gradient(180deg,#ff7eb3,#9b6bff);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .sub { color:#5a6480; font-size:15px; margin:6px 0 16px; }
  .name-input {
    width:100%; border:2px solid #e3e7f5; border-radius:14px; padding:13px 14px;
    font-size:17px; font-weight:700; color:#39406a; text-align:center; background:#fbfcff;
    margin-bottom:18px; outline:none;
  }
  .name-input:focus { border-color:#9b6bff; }
  .games { display:flex; flex-direction:column; gap:12px; margin-bottom:16px; }
  .game-card {
    display:flex; align-items:center; gap:14px; text-align:left; text-decoration:none;
    border-radius:20px; padding:16px 18px; color:#fff;
    box-shadow:0 8px 20px rgba(0,0,0,.14); transition:transform .06s ease;
  }
  .game-card:active { transform:scale(.97); }
  .game-card .ico { font-size:34px; width:46px; text-align:center; }
  .game-card .gname { font-size:20px; font-weight:900; display:block; }
  .game-card .gdesc { font-size:12.5px; font-weight:600; opacity:.92; display:block; }
  .game-card.dash { background:linear-gradient(135deg,#ff9ed6,#ff5fa0); }
  .game-card.xo   { background:linear-gradient(135deg,#9b8cff,#7d4dff); }
  .game-card.math { background:linear-gradient(135deg,#5fd1c9,#3aa6c4); }
  .btn {
    display:inline-block; border:none; cursor:pointer; font-size:17px; font-weight:800; color:#4a4f78;
    padding:13px 26px; border-radius:999px; background:#eceffb; text-decoration:none;
  }
  .btn:active { transform:translateY(2px); }
  .tip { margin-top:14px; color:#9aa3c0; font-size:12.5px; line-height:1.4; }

  .scrim { position:fixed; inset:0; display:none; align-items:center; justify-content:center;
           background:rgba(30,20,55,.4); padding:16px; }
  .scrim.show { display:flex; }
  .lb-title { font-size:13px; font-weight:800; color:#8a93b2; text-transform:uppercase; letter-spacing:.7px; margin-bottom:10px; }
  .lb-row { display:flex; align-items:center; gap:8px; padding:8px 10px; border-radius:10px; font-weight:700; font-size:15px; }
  .lb-row:nth-child(even) { background:#f4f6fd; }
  .lb-rank { width:22px; text-align:center; font-weight:900; color:#9b6bff; }
  .lb-name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .lb-score { font-weight:900; }
  .lb-load, .lb-empty { text-align:center; color:#9aa3c0; font-size:13px; padding:10px; }
</style>
</head>
<body>
<div class="card">
  <div class="title">Talia &amp; her Friends</div>
  <div class="sub">Pick a game to play!</div>
  <input id="nameInput" class="name-input" maxlength="12" placeholder="Type your name" autocomplete="off">
  <div class="games">
    <a class="game-card dash" href="dash.html"><span class="ico">&#129403;</span><span><span class="gname">Cupcake Dash</span><span class="gdesc">Run, jump &amp; collect cupcakes</span></span></a>
    <a class="game-card xo" href="xo.html"><span class="ico">&#11093;</span><span><span class="gname">Tic-Tac-Toe</span><span class="gdesc">1 player or 1-vs-1 online</span></span></a>
    <a class="game-card math" href="math.html"><span class="ico">&#10133;</span><span><span class="gname">Math Speed</span><span class="gdesc">Beat the clock &middot; solo or 1-vs-1</span></span></a>
  </div>
  <button class="btn" id="lbBtn">&#127942; Leaderboard</button>
  <div class="tip">In Safari: tap <b>Share &rarr; Add to Home Screen</b> to play like an app.</div>
</div>

<div class="scrim" id="lbScrim">
  <div class="card" style="width:min(88vw,360px)">
    <div class="title" style="font-size:28px">Leaderboard</div>
    <div class="sub">Cupcake Dash &middot; Top 10</div>
    <div id="lbList"></div>
    <button class="btn" id="lbClose" style="margin-top:14px">Close</button>
  </div>
</div>

<script>
(function(){
  "use strict";
  var SUPABASE_URL = "https://bvyioedpannmxhhscnxc.supabase.co";
  var SUPABASE_KEY = "sb_publishable__9VP0hucGQ3NNJyftExz-w_urRWgvbj";

  var elName = document.getElementById('nameInput');
  try { elName.value = localStorage.getItem('talia_name') || ''; } catch(e){}
  function saveName(){ try { localStorage.setItem('talia_name', (elName.value || '').trim().slice(0,12)); } catch(e){} }
  elName.addEventListener('input', saveName);
  elName.addEventListener('change', saveName);

  function esc(s){ return String(s).replace(/[&<>"']/g, function(c){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]; }); }
  function headers(){ return { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY }; }

  var elLbScrim = document.getElementById('lbScrim');
  var elLbList = document.getElementById('lbList');
  document.getElementById('lbBtn').addEventListener('click', function(){
    elLbScrim.classList.add('show');
    elLbList.innerHTML = '<div class="lb-load">Loading&hellip;</div>';
    fetch(SUPABASE_URL + '/rest/v1/scores?select=name,score&game=eq.dash&order=score.desc&limit=10', { headers: headers() })
      .then(function(r){ return r.json(); })
      .then(function(list){
        if (!Array.isArray(list) || !list.length){ elLbList.innerHTML = '<div class="lb-empty">No scores yet &mdash; be the first!</div>'; return; }
        var html = '<div class="lb-title">Top Scores</div>';
        for (var i = 0; i < list.length; i++){
          html += '<div class="lb-row"><span class="lb-rank">' + (i+1) + '</span><span class="lb-name">' + esc(list[i].name || 'Player') + '</span><span class="lb-score">' + (list[i].score|0) + '</span></div>';
        }
        elLbList.innerHTML = html;
      })
      .catch(function(){ elLbList.innerHTML = '<div class="lb-empty">Could not load right now.</div>'; });
  });
  document.getElementById('lbClose').addEventListener('click', function(){ elLbScrim.classList.remove('show'); });
  elLbScrim.addEventListener('click', function(e){ if (e.target === elLbScrim) elLbScrim.classList.remove('show'); });
})();
</script>
</body>
</html>
